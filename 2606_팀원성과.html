<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀원별 KPI 달성률 트래커</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeece8;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #666;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    padding: 2rem 1.5rem;
    min-height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .badge {
    font-size: 12px;
    color: var(--text2);
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .name { font-size: 14px; font-weight: 600; color: var(--text); }
  .brand { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .kpi-row { margin-bottom: 12px; }
  .kpi-row:last-child { margin-bottom: 0; }

  .kpi-label-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
  }

  .kpi-label { font-size: 11px; color: var(--text2); }

  .kpi-right {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .kpi-pct { font-size: 13px; font-weight: 600; }
  .kpi-cnt { font-size: 11px; color: var(--text2); }

  .track {
    height: 12px;
    background: var(--bg2);
    border-radius: 99px;
    position: relative;
    overflow: visible;
  }

  .fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    max-width: 100%;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }

  .today-line {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: var(--text3);
    opacity: 0.6;
    border-radius: 1px;
    z-index: 2;
  }

  .today-label {
    position: absolute;
    top: -20px;
    font-size: 10px;
    color: var(--text3);
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 10px 0;
  }

  .rev-input {
    width: 100%;
    margin-top: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
  }

  .rev-input:focus { border-color: #378ADD; }
  .rev-input::placeholder { color: var(--text3); }

  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .legend-line {
    width: 2px;
    height: 10px;
    background: var(--text3);
    opacity: 0.6;
    border-radius: 1px;
    flex-shrink: 0;
  }

  .green { color: #1D9E75; }
  .red   { color: #E24B4A; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 팀원별 KPI 달성률 트래커</h1>
  <span class="badge" id="dateBadge"></span>
</div>

<div class="grid" id="grid"></div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#378ADD"></span>기획 달성률 (목표 60건/분기)</div>
  <div class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>제작 달성률 (목표 120건/분기)</div>
  <div class="legend-item"><span class="legend-dot" style="background:#BA7517"></span>매출 달성률 (목표 2,000만원)</div>
  <div class="legend-item"><span class="legend-line"></span>오늘 기준선</div>
</div>

<script>
const PLAN_GOAL = 60;
const MAKE_GOAL = 120;
const REV_GOAL  = 20000000;

// 분기: 4/1 ~ 6/30 = 91일
// 오늘 날짜 기준으로 경과일 자동 계산
function getQuarterProgress() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 3, 1); // 4월 1일
  const end   = new Date(now.getFullYear(), 6, 0); // 6월 30일
  const total = (end - start) / 86400000 + 1;
  const elapsed = Math.min(Math.floor((now - start) / 86400000) + 1, total);
  return { elapsed, total, pct: Math.round(elapsed / total * 100) };
}

const q = getQuarterProgress();

// 날짜 배지
const now = new Date();
document.getElementById('dateBadge').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 기준 · 분기 ${q.pct}% 경과`;

const members = [
  { name:'이성은', brand:'알파에이징핏',           initials:'이성', bg:'#E6F1FB', fg:'#185FA5', plan:10, make:9  },
  { name:'이수아', brand:'알파에이징핏',           initials:'이수', bg:'#E6F1FB', fg:'#185FA5', plan:15, make:14 },
  { name:'정해슬', brand:'알파에이징핏 · 림데이',  initials:'정해', bg:'#E1F5EE', fg:'#0F6E56', plan:22, make:24 },
  { name:'조영웅', brand:'안티칼알파',             initials:'조영', bg:'#FBEAF0', fg:'#993556', plan:20, make:18 },
  { name:'신소예', brand:'안티칼알파',             initials:'신소', bg:'#FBEAF0', fg:'#993556', plan:25, make:28 },
  { name:'오유림', brand:'림데이 · 알파에이징핏',  initials:'오유', bg:'#E1F5EE', fg:'#0F6E56', plan:27, make:31 },
];

const revState = {};
const todayLeft = Math.min(q.pct, 96);

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function pctColor(pct) { return pct >= q.pct ? '#1D9E75' : '#E24B4A'; }

function updateRev(name) {
  const rev = revState[name] || 0;
  const pct = Math.min(Math.round(rev / REV_GOAL * 100), 100);
  const gauge = document.getElementById(`rg_${name}`);
  const pctEl = document.getElementById(`rp_${name}`);
  const cntEl = document.getElementById(`rc_${name}`);
  if (gauge) gauge.style.width = pct + '%';
  if (pctEl) { pctEl.textContent = pct + '%'; pctEl.style.color = pctColor(pct); }
  if (cntEl) cntEl.textContent = fmt(rev) + '원 / 2,000만원';
}

const grid = document.getElementById('grid');
const animFills = [];

members.forEach(m => {
  const planPct = Math.round(m.plan / PLAN_GOAL * 100);
  const makePct = Math.round(m.make / MAKE_GOAL * 100);
  const key = m.name;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="avatar" style="background:${m.bg};color:${m.fg}">${m.initials}</div>
      <div>
        <div class="name">${m.name}</div>
        <div class="brand">${m.brand}</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-label-row">
        <span class="kpi-label">콘텐츠 기획</span>
        <span class="kpi-right">
          <span class="kpi-pct" style="color:${pctColor(planPct)}">${planPct}%</span>
          <span class="kpi-cnt">${m.plan} / ${PLAN_GOAL}건</span>
        </span>
      </div>
      <div class="track">
        <div class="fill" id="pg_${key}" style="background:#378ADD"></div>
        <div class="today-line" style="left:${todayLeft}%">
          <span class="today-label">오늘 ${q.pct}%</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="kpi-row">
      <div class="kpi-label-row">
        <span class="kpi-label">콘텐츠 제작</span>
        <span class="kpi-right">
          <span class="kpi-pct" style="color:${pctColor(makePct)}">${makePct}%</span>
          <span class="kpi-cnt">${m.make} / ${MAKE_GOAL}건</span>
        </span>
      </div>
      <div class="track">
        <div class="fill" id="mg_${key}" style="background:#1D9E75"></div>
        <div class="today-line" style="left:${todayLeft}%">
          <span class="today-label">오늘 ${q.pct}%</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="kpi-row">
      <div class="kpi-label-row">
        <span class="kpi-label">매출</span>
        <span class="kpi-right">
          <span class="kpi-pct" id="rp_${key}" style="color:var(--text3)">0%</span>
          <span class="kpi-cnt" id="rc_${key}">0원 / 2,000만원</span>
        </span>
      </div>
      <div class="track">
        <div class="fill" id="rg_${key}" style="background:#BA7517"></div>
        <div class="today-line" style="left:${todayLeft}%">
          <span class="today-label">오늘 ${q.pct}%</span>
        </div>
      </div>
      <input
        class="rev-input"
        type="number"
        placeholder="매출 입력 (원)"
        oninput="revState['${key}'] = Number(this.value)||0; updateRev('${key}')"
      />
    </div>
  `;

  grid.appendChild(card);
  animFills.push({ planId:`pg_${key}`, makeId:`mg_${key}`, planPct, makePct });
});

// 게이지 애니메이션
setTimeout(() => {
  animFills.forEach(f => {
    document.getElementById(f.planId).style.width = Math.min(f.planPct, 100) + '%';
    document.getElementById(f.makeId).style.width = Math.min(f.makePct, 100) + '%';
  });
}, 150);
</script>
</body>
</html>
